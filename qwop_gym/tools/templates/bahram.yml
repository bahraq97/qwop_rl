---
seed: ~


run_id: 2


model_load_file: ~


out_dir_template: "data/Bahram-{run_id}"

log_tensorboard: true

total_timesteps: 1000000


max_episode_steps: 5000


n_checkpoints: 5

learner_kwargs:
  policy: "MlpPolicy"
  device: "cuda"
  use_sde: false
  sde_sample_freq: 4
  n_steps: 2048
  batch_size: 32
  n_epochs: 10
  gamma: 0.9
  gae_lambda: 0.98
  clip_range: 0.4
  normalize_advantage: true
  ent_coef: 0.001
  vf_coef: 0.5
  max_grad_norm: 3

learner_lr_schedule: "const_0.001"


env_kwargs:
  __include__: "config/env.yml"
  frames_per_step: 4
  reduced_action_set: false
  text_in_browser: "Do not close this window, training in progress..."


env_wrappers:
  - module: "qwop_gym.wrappers.anti_knee_slide_wrapper"
    cls: "AntiKneeSlideWrapper"
    kwargs:
      penalty: -0.5
      ground_threshold: 8.5